name: build

on:
  push:
    paths-ignore:
    - '.vscode/**'
    - '.editorconfig'
    - '**.md'
    - 'LICENSE'

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: Restore tools
      run: dotnet tool restore
    - name: Build
      shell: cmd
      run: |
        CALL .build/SetEnv.bat
        dotnet.exe msbuild Ziusudra.proj -nologo -t:Release -m -mt -r -fl -flp:logfile=build.log;verbosity=diagnostic;encoding=UTF-8 -bl:build.binlog -nr:False -tl:off
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        directory: tmp/
        disable_search: true
        files: tmp/Ziusudra-cobertura-results.xml
        flags: unittests
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
        name: outputs
        path: |
          tmp/out/bin/**.*
    - name: Archive logs
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: logs
        path: |
          build.log
          build.binlog
        retention-days: 5
